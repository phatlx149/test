<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Việt Thương Mucsic | Phân phối sản phẩm âm nhạc tốt nhất hiện nay
    </title>
    <link rel="shortcut icon" href="./img/logotiltle.jpg" type="image/x-icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@100&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/reponsive.css" />
    <link rel="stylesheet" href="./css/reponsive-tablet_index.css" />
  </head>

  <body>
   
    <div class="loader-mask" style="display: none;">
      <div class="loader" style="display: none;">
        <div></div>
      </div>
    </div>
   </div>
    <div class="slider">
      <div class="slides">
        <input type="radio" name="btn-radio" id="radio1" />
        <input type="radio" name="btn-radio" id="radio2" />
        <input type="radio" name="btn-radio" id="radio3" />
        <input type="radio" name="btn-radio" id="radio4" />
        <input type="radio" name="btn-radio" id="radio5" />
        <div class="slide s1">
          <img src="./img/slide-1.jpg" alt="" />
        </div>
        <div class="slide">
          <img src="./img/slide-2.jpg" alt="" />
        </div>
        <div class="slide">
          <img src="./img/slide-3.jpg" alt="" />
        </div>
        <div class="slide">
          <img src="./img/slide-4.jpg" alt="" />
        </div>
        <div class="slide">
          <img src="./img/slide-5.jpg" alt="" />
        </div>
        <div class="navigation-auto">
          <div class="auto-btn1"></div>
          <div class="auto-btn2"></div>
          <div class="auto-btn3"></div>
          <div class="auto-btn4"></div>
          <div class="auto-btn5"></div>
        </div>
        <div class="navigation">
          <label for="radio1"></label>
          <label for="radio2"></label>
          <label for="radio3"></label>
          <label for="radio4"></label>
          <label for="radio5"></label>
        </div>
      </div>
    </div>
    <script>
        $(window).on('load', function(event) {
    $('div').removeClass('preloading');
        // $('.load').delay(1000).fadeOut('fast');
    $('.loader').delay(1000).fadeOut('fast');
});
    </script>
  </body>
</html>
